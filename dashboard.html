<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workbench | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Teal-900: #002D2A;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --Neutral-500: #737373;
      --White: #FFFFFF;
      --S-16: 16px; --S-24: 24px; --S-32: 32px; --S-48: 48px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; }

    header {
      width: 100%; height: 80px; display: flex; align-items: center; position: fixed; top: 0; z-index: 1000;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--Glass-Border);
    }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 var(--S-48); }
    header .container { display: flex; align-items: center; justify-content: space-between; padding: 0; }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    .btn-outline {
      height: 40px; padding: 0 20px; border-radius: 8px; border: 1px solid var(--Glass-Border);
      color: var(--White); font-size: 12px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: 0.2s;
    }
    .btn-outline:hover { background: var(--Glass); border-color: var(--White); }

    main { padding-top: 120px; height: 100vh; overflow-y: auto; }
    .grid-workbench { display: grid; grid-template-columns: 280px 1fr; gap: var(--S-48); align-items: start; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: 0; display: flex; flex-direction: column; gap: var(--S-32); }
    .sidebar-nav a {
      display: block; padding: 12px 16px; border-radius: 12px; color: var(--Neutral-400);
      text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.2s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--Glass); color: var(--Mint); }

    /* CONTENT CARDS */
    .glass-card { background: var(--Glass); border: 1px solid var(--Glass-Border); border-radius: 20px; padding: var(--S-32); }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--S-24); margin-bottom: var(--S-48); }
    .stat-card h4 { font-size: 10px; font-weight: 900; color: var(--Neutral-500); text-transform: uppercase; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 900; color: var(--White); }

    .scan-list { display: flex; flex-direction: column; gap: var(--S-16); }
    .scan-item {
      display: flex; align-items: center; justify-content: space-between; padding: 20px;
      border-bottom: 1px solid var(--Glass-Border); transition: 0.2s;
    }
    .scan-item:hover { background: rgba(255,255,255,0.02); }
    .scan-info h5 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .scan-info p { font-size: 12px; color: var(--Neutral-400); }
    .scan-badge { background: var(--Teal-900); color: var(--Mint); padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; }

    .empty-state { text-align: center; padding: var(--S-80) 0; color: var(--Neutral-500); }

    #loadingOverlay {
        position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--Mint);
    }
  </style>
</head>
<body>

  <div id="loadingOverlay">Initializing Workbench...</div>

  <header>
    <div class="container">
      <a class="logo" href="/">
        <div class="logo-mark"></div>
        <div class="logo-text">KORRA</div>
      </a>
      <div style="display:flex; align-items:center; gap:var(--S-24)">
        <span id="userDisplay" style="font-size:12px; font-weight:700; color:var(--Mint)"></span>
        <button class="btn-outline" id="btnSignOut">Exit</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="grid-workbench">
        <aside class="sidebar">
          <nav class="sidebar-nav">
            <a href="#" class="active">Biometrics Vault</a>
            <a href="#">Scan History</a>
            <a href="#">Merchant API</a>
            <a href="#">Settings</a>
          </nav>

          <div class="glass-card" style="padding: 24px;">
            <h4 style="font-size:10px; font-weight:900; color:var(--Mint); margin-bottom:12px; text-transform:uppercase">Subscription</h4>
            <p style="font-size:13px; font-weight:700;">Merchant Pro</p>
            <p style="font-size:11px; color:var(--Neutral-400); margin-top:4px">$0.50 / scan active</p>
          </div>
        </aside>

        <section class="content">
          <div class="stat-grid">
            <div class="glass-card stat-card">
              <h4>Total Scans</h4>
              <div class="value">0</div>
            </div>
            <div class="glass-card stat-card">
              <h4>Accuracy Avg</h4>
              <div class="value">±1cm</div>
            </div>
            <div class="glass-card stat-card">
              <h4>Credits</h4>
              <div class="value">10</div>
            </div>
          </div>

          <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px">
              <h2 style="font-size:24px;">Recent Measurements</h2>
              <button class="btn-outline" style="border-color:var(--Mint); color:var(--Mint)">+ New Scan</button>
            </div>

            <div class="scan-list" id="scanList">
              <div class="empty-state">
                <p>No biometric data found.</p>
                <p style="font-size:12px; margin-top:8px">Start a new scan to populate your vault.</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase-js.min.js"></script>
  <script>
    (function() {
      const config = {
        supabaseUrl: 'https://blsettabymllulsxtziw.supabase.co',
        supabaseKey: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y'
      };

      async function initDashboard() {
        if (typeof window.supabase === 'undefined') {
          setTimeout(initDashboard, 500);
          return;
        }

        const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

        // SESSION GUARD
        const { data: { session }, error } = await supabase.auth.getSession();

        if (!session) {
          console.warn("Unauthenticated access. Redirecting to signin...");
          window.location.href = '/signin.html';
          return;
        }

        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('userDisplay').textContent = session.user.email;

        document.getElementById('btnSignOut').addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = '/';
        });
      }

      initDashboard();
    })();
  </script>
</body>
</html>
