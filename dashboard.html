<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workbench | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Teal-900: #002D2A;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --Neutral-500: #737373;
      --White: #FFFFFF;
      --Error: #D63031;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow-x: hidden; }

    header {
      width: 100%; height: 80px; display: flex; align-items: center; position: fixed; top: 0; z-index: 1000;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--Glass-Border);
    }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 48px; }
    header .container { display: flex; align-items: center; justify-content: space-between; padding: 0; }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    .btn-outline {
      height: 40px; padding: 0 20px; border-radius: 8px; border: 1px solid var(--Glass-Border);
      color: var(--White); font-size: 12px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: 0.2s; background: none;
    }
    .btn-outline:hover { background: var(--Glass); border-color: var(--White); }

    .btn-primary {
      height: 40px; padding: 0 20px; border-radius: 8px; background: var(--Mint); color: var(--Obsidian);
      font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: none; transition: 0.2s;
    }

    main { padding-top: 120px; height: 100vh; overflow-y: auto; }
    .grid-workbench { display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: start; }

    .sidebar-nav a {
      display: block; padding: 12px 16px; border-radius: 12px; color: var(--Neutral-400);
      text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.2s; cursor: pointer;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--Glass); color: var(--Mint); }

    .glass-card { background: var(--Glass); border: 1px solid var(--Glass-Border); border-radius: 20px; padding: 32px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 48px; }
    .stat-card h4 { font-size: 10px; font-weight: 900; color: var(--Neutral-500); text-transform: uppercase; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 900; color: var(--White); }

    .scan-item {
      display: flex; align-items: center; justify-content: space-between; padding: 20px;
      border-bottom: 1px solid var(--Glass-Border);
    }
    .scan-info h5 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .scan-info p { font-size: 12px; color: var(--Neutral-400); }

    .tab-view { display: none; }
    .tab-view.active { display: block; animation: fadeIn 0.3s ease-out; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      width: 100%; max-width: 480px; background: #0a0a0a; border: 1px solid var(--Glass-Border);
      border-radius: 24px; padding: 40px;
    }

    .input-field { width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border); border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; margin-bottom: 20px; }

    #dashboard-3d-viewport { width: 100%; height: 350px; background: #000; border-radius: 16px; border: 1px solid var(--Glass-Border); margin-bottom: 32px; position: relative; overflow: hidden; }
    #dashboard-3d-viewport span { position: absolute; top: 12px; left: 16px; font-size: 9px; font-weight: 900; color: var(--Mint); text-transform: uppercase; letter-spacing: 0.2em; z-index: 10; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }

    #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; letter-spacing: 0.2em; color: var(--Mint); text-transform: uppercase; }
  </style>
  <script>
    if (window.top !== window.self) window.top.location.href = window.location.href;
  </script>
</head>
<body>

  <div id="loadingOverlay">Syncing Vault...</div>

  <!-- EMAIL SHARE MODAL -->
  <div class="modal-overlay" id="shareModal">
    <div class="modal-card">
      <h2 style="font-size:24px; margin-bottom:12px">Invite Client</h2>
      <p style="color:var(--Neutral-400); margin-bottom:32px">Send a secure scan link to your client's email.</p>

      <form id="shareForm">
        <label style="font-size:10px; font-weight:900; color:var(--Neutral-500); display:block; margin-bottom:8px">CLIENT NAME</label>
        <input type="text" id="shareName" class="input-field" placeholder="e.g. James" required>

        <label style="font-size:10px; font-weight:900; color:var(--Neutral-500); display:block; margin-bottom:8px">CLIENT EMAIL</label>
        <input type="email" id="shareEmail" class="input-field" placeholder="james@example.com" required>

        <button type="submit" class="btn-primary" id="btnSendInvite" style="width:100%; height:52px">Send Scan Invitation</button>
        <button type="button" class="btn-outline" style="width:100%; border:none; margin-top:12px" onclick="document.getElementById('shareModal').classList.remove('active')">Cancel</button>
      </form>
    </div>
  </div>

  <header>
    <div class="container">
      <a class="logo" href="/"><div class="logo-mark"></div><div class="logo-text">KORRA</div></a>
      <div style="display:flex; align-items:center; gap:24px">
        <span id="userEmail" style="font-size:12px; font-weight:700; color:var(--Mint)"></span>
        <button class="btn-outline" id="btnSignOut">Exit</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="grid-workbench">
        <aside>
          <nav class="sidebar-nav">
            <a onclick="switchTab('vault')" id="tab-vault" class="active">Biometrics Vault</a>
            <a href="/developers">Developer API</a>
            <a onclick="switchTab('settings')" id="tab-settings">Settings</a>
          </nav>
        </aside>

        <section>
          <div id="view-vault" class="tab-view active">
            <div id="dashboard-3d-viewport"><span>3D Digital Twin Viewer</span></div>

            <div class="stat-grid">
              <div class="glass-card stat-card"><h4>Vault Capacity</h4><div class="value" id="statTotal">0</div></div>
              <div class="glass-card stat-card"><h4>Avg Precision</h4><div class="value">±1cm</div></div>
              <div class="glass-card stat-card"><h4>Credits</h4><div class="value" id="statCredits">0</div></div>
            </div>

            <div class="glass-card">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px">
                <h2 style="font-size:24px;">Measurement Ledger</h2>
                <button class="btn-primary" onclick="document.getElementById('shareModal').classList.add('active')">+ Invite Client</button>
              </div>
              <div id="scanList"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="/assets/supabase.min.js"></script>
  <script src="/assets/three.min.js"></script>
  <script src="/assets/korra_viz.js"></script>
  <script src="/assets/korra_export.js"></script>

  <script>
    const CONFIG = {
      url: 'https://blsettabymllulsxtziw.supabase.co',
      key: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y'
    };

    window.KORRA_DB = null;
    let userId = null;

    function switchTab(id) {
      document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    }

    (function() {
      async function fetchHistory() {
        const { data } = await window.KORRA_DB.from('measurements').select('*').eq('user_id', userId).order('created_at', { ascending: false });
        if(!data) return;
        document.getElementById('statTotal').textContent = data.length;
        document.getElementById('scanList').innerHTML = data.map(s => `
          <div class="scan-item">
            <div class="scan-info">
              <h5>${s.client_name}</h5>
              <p>${new Date(s.created_at).toLocaleDateString()} • ${s.height}cm • ${s.gender}</p>
            </div>
            <div style="display:flex; gap:12px">
              <button class="btn-outline" style="height:32px; font-size:10px" onclick="window.KORRA_VIZ.loadMesh('${s.mesh_url}')">View 3D</button>
            </div>
          </div>
        `).join('');
      }

      async function init() {
        if (typeof window.supabase === 'undefined') { setTimeout(init, 500); return; }
        window.KORRA_DB = window.supabase.createClient(CONFIG.url, CONFIG.key);
        const { data: { session } } = await window.KORRA_DB.auth.getSession();
        if (!session) { window.location.href = '/signin'; return; }

        userId = session.user.id;
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('userEmail').textContent = session.user.email;

        fetchHistory();
        if (window.KORRA_VIZ) window.KORRA_VIZ.init('dashboard-3d-viewport');
      }

      document.getElementById('shareForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSendInvite');
        btn.disabled = true; btn.textContent = 'SENDING...';

        const fd = new FormData();
        fd.append('merchant_id', userId);
        fd.append('customer_email', document.getElementById('shareEmail').value);
        fd.append('client_name', document.getElementById('shareName').value);

        try {
          const res = await fetch('/api/v2/share/send-email', { method: 'POST', body: fd });
          if(res.ok) {
            alert("Scan invitation sent successfully!");
            document.getElementById('shareModal').classList.remove('active');
          } else { alert("Email Handshake Failed. Check SendGrid Config."); }
        } catch(e) { alert("Sync Error."); }
        finally { btn.disabled = false; btn.textContent = 'Send Scan Invitation'; }
      });

      document.getElementById('btnSignOut').onclick = async () => { await window.KORRA_DB.auth.signOut(); window.location.href = '/signin'; };
      init();
    })();
  </script>
</body>
</html>
