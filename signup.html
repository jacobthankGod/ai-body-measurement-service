<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Access | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- --- TRUE INDUSTRIAL SELF-HOSTING --- -->
  <script src="/assets/supabase.min.js"></script>

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --White: #FFFFFF;
      --S-24: 24px; --S-32: 32px; --S-48: 48px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; }

    .auth-container { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; overflow-y: auto; }

    .auth-card {
      width: 100%; max-width: 500px; background: var(--Glass); border: 1px solid var(--Glass-Border);
      border-radius: 24px; padding: var(--S-48); backdrop-filter: blur(20px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (max-width: 550px) {
      .auth-container { padding: 32px 16px; }
      .auth-card { padding: 32px 24px; border-radius: 16px; border: none; background: transparent; backdrop-filter: none; }
      h2 { font-size: 28px; }
      .form-group-row { grid-template-columns: 1fr !important; gap: 0 !important; }
    }

    .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    p { color: var(--Neutral-400); margin-bottom: 40px; font-size: 15px; }

    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--Neutral-400); letter-spacing: 0.1em; margin-bottom: 8px; }
    .form-input, select {
      width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border);
      border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; transition: 0.2s;
    }
    .form-input:focus, select:focus { outline: none; border-color: var(--Mint); background: rgba(255,255,255,0.08); }
    select option { background: #000; color: #fff; }

    .btn {
      width: 100%; height: 52px; background: var(--Mint); color: var(--Obsidian); border: none;
      border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #6effeb; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .switch-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--Neutral-400); text-decoration: none; transition: 0.2s; }
    .switch-link span { color: var(--Mint); font-weight: 700; }
    .switch-link:hover { color: #fff; }

    /* SUCCESS STATE UI */
    #successView { display: none; text-align: center; }
    .success-icon {
      width: 80px; height: 80px; background: var(--Mint); border-radius: 50%; margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--Obsidian);
      box-shadow: 0 0 40px rgba(87, 215, 192, 0.3);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <!-- PRIMARY SIGNUP VIEW -->
    <div class="auth-card" id="signupCard">
      <a href="/" class="logo-area">
        <div class="logo-mark"></div>
        <div class="logo-text">KORRA</div>
      </a>

      <div id="formContent">
        <h2 id="viewTitle">Get Access</h2>
        <p id="viewSub">Start your precision journey today.</p>

        <form id="signUpForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="upName" placeholder="Full Name" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="upEmail" placeholder="name@email.com" required>
          </div>

          <div id="merchantFields">
            <div class="form-group-row" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                <label class="form-label">Company Name</label>
                <input type="text" class="form-input" id="upCompany" placeholder="Brand Name">
                </div>
                <div class="form-group">
                <label class="form-label">Industry</label>
                <select id="upIndustry">
                    <option value="luxury_mtm">Luxury MTM</option>
                    <option value="manufacturing">Manufacturing</option>
                    <option value="bridal">Bridal & Tuxedo</option>
                    <option value="ready_to_wear">Ready-To-Wear</option>
                    <option value="custom_apparel">Custom Apparel</option>
                </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Monthly Volume (Scans)</label>
                <select id="upVolume">
                <option value="0-50">1 - 50 scans</option>
                <option value="51-200">51 - 200 scans</option>
                <option value="201-1000">201 - 1,000 scans</option>
                <option value="1000+">1,000+ scans</option>
                </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Create Key (Password)</label>
            <input type="password" class="form-input" id="upPass" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn" id="btnSignUp">Initialize Account</button>
        </form>

        <a href="/signin" id="linkSignIn" class="switch-link">Already have an account? <span>Sign In</span></a>
      </div>

      <!-- CINEMATIC SUCCESS VIEW -->
      <div id="successView">
        <div class="success-icon">✓</div>
        <h2 style="color:var(--Mint)">Account Created</h2>
        <p>Your precision workbench is almost ready. Please check your email to verify your artisan portal before logging in.</p>
        <a id="successLoginLink" href="/signin" class="btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center">Go to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const config = {
        url: 'https://blsettabymllulsxtziw.supabase.co',
        key: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y'
      };
      const KORRA_CORE = window.supabase.createClient(config.url, config.key);

      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      const role = params.get('role'); // 'client' or 'artisan'
      const mId = params.get('m'); // merchant_id from deep link

      // UI CONTEXT ADAPTATION
      if (role === 'client') {
          document.getElementById('viewTitle').textContent = "Join KORRA";
          document.getElementById('viewSub').textContent = "Secure your Size Passport for a perfect fit.";
          document.getElementById('merchantFields').style.display = 'none';
          document.getElementById('btnSignUp').textContent = 'Create My Fit Profile';
      }

      if (next) {
        document.getElementById('linkSignIn').href = `/signin?next=${encodeURIComponent(next)}`;
        document.getElementById('successLoginLink').href = `/signin?next=${encodeURIComponent(next)}`;
      }

      const form = document.getElementById('signUpForm');
      const btn = document.getElementById('btnSignUp');
      const formContent = document.getElementById('formContent');
      const successView = document.getElementById('successView');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        e.stopPropagation();

        const email = document.getElementById('upEmail').value;
        const password = document.getElementById('upPass').value;
        const name = document.getElementById('upName').value;

        const userType = role === 'client' ? 'INDIVIDUAL' : 'ARTISAN';
        const metadata = {
            full_name: name,
            user_type: userType
        };

        if (userType === 'ARTISAN') {
            metadata.company_name = document.getElementById('upCompany').value;
            metadata.industry = document.getElementById('upIndustry').value;
            metadata.monthly_volume = document.getElementById('upVolume').value;
        } else if (mId) {
            // Track the referring merchant for individuals
            metadata.invited_by = mId;
        }

        btn.disabled = true;
        btn.textContent = 'Synchronizing Identity...';

        try {
          const { data, error } = await KORRA_CORE.auth.signUp({
            email,
            password,
            options: {
              data: metadata
            }
          });

          if (error) {
            alert(error.message);
          } else {
            // CINEMATIC TRANSITION
            formContent.style.opacity = '0';
            setTimeout(() => {
              formContent.style.display = 'none';
              successView.style.display = 'block';
              setTimeout(() => { successView.style.opacity = '1'; }, 50);
            }, 400);
          }
        } catch (err) {
          alert("Handshake Failure. Please check connection.");
        } finally {
          btn.disabled = false;
          btn.textContent = 'Initialize Account';
        }
      });
    })();
  </script>
</body>
</html>
