services:
  korra-ai:
    image: korra-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korra-ai-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./public/meshes:/app/public/meshes
      - /home/ubuntu/tailornet_data:/app/api/services/tailornet_data
    networks:
      - korra-network

networks:
  korra-network:
    driver: bridge
