<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Confirmed | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --White: #FFFFFF;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }

    .success-container { width: 100%; max-width: 480px; text-align: center; padding: 40px; }

    .logo-area { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 48px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    .icon-3d { width: 160px; height: 160px; margin: 0 auto 32px; object-fit: contain; }

    h2 { font-size: 36px; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.04em; color: #fff; }
    .sub-p { color: var(--Neutral-400); margin-bottom: 48px; font-size: 16px; line-height: 1.6; }

    .btn {
      width: 100%; height: 60px; background: var(--Mint); color: var(--Obsidian); border: none;
      border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
      display: flex; align-items: center; justify-content: center; text-decoration: none;
      box-shadow: 0 10px 30px rgba(87, 215, 192, 0.2);
    }
    .btn:hover { background: #6effeb; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(87, 215, 192, 0.4); }
  </style>
</head>
<body>

  <div class="success-container">
    <a href="/" class="logo-area">
      <img src="/assets/Korra_logo_final.png" alt="Korra" style="height:40px; width:auto;">
      <span style="font-size:22px; font-weight:900; letter-spacing:-0.03em;">Korra</span>
    </a>

    <img src="/assets/success-verify.png" alt="Verified" class="icon-3d">

    <h2>Verification Successful</h2>
    <p class="sub-p">Your account is now ready. Let's finish setting up your profile so you can start scanning.</p>

    <a href="/onboarding" class="btn" id="btnNext">Enter Onboarding</a>
  </div>

  <script>
    // AUTOMATIC DOMAIN REDIRECTION
    // If the user lands on the IP address, redirect them to the secure domain
    // while keeping the hash (access_token) intact.
    (function() {
      const DOMAIN = 'korra.work';
      if (window.location.hostname !== DOMAIN && window.location.hostname !== 'www.' + DOMAIN) {
        console.log("Redirecting to secure production domain...");
        const newUrl = 'https://' + DOMAIN + window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(newUrl);
      }

      // Handle the 'next' parameter if present
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      if (next) {
        document.getElementById('btnNext').href = next;
      }
    })();
  </script>
</body>
</html>
