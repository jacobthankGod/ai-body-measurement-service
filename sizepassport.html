<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Size Passport | KORRA</title>
  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="/assets/supabase.min.js"></script>
  <style>
    :root {
      --Obsidian: #000000; --Mint: #57D7C0; --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1); --Neutral-400: #A3A3A3; --White: #FFFFFF;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow-x: hidden; }
    header { width: 100%; height: 80px; display: flex; align-items: center; position: fixed; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--Glass-Border); }
    .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 24px; }
    header .container { display: flex; align-items: center; justify-content: space-between; padding: 0; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }
    main { padding-top: 120px; padding-bottom: 80px; }
    .passport-card { background: var(--Glass); border: 2px solid var(--Mint); border-radius: 32px; padding: 48px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(87, 215, 192, 0.1); }
    .passport-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .passport-id { font-size: 11px; font-weight: 900; color: var(--Mint); text-transform: uppercase; letter-spacing: 0.2em; background: rgba(87, 215, 192, 0.1); padding: 8px 16px; border-radius: 99px; }
    .user-name { font-size: 32px; font-weight: 900; margin-top: 12px; }
    .biometric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
    .bio-item { padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--Glass-Border); }
    .bio-label { font-size: 10px; font-weight: 900; color: var(--Neutral-400); text-transform: uppercase; margin-bottom: 8px; }
    .bio-value { font-size: 20px; font-weight: 800; color: var(--Mint); }
    .qr-area { text-align: center; margin-top: 48px; padding-top: 48px; border-top: 1px solid var(--Glass-Border); }
    .qr-box { width: 200px; height: 200px; background: #fff; border-radius: 16px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
    .btn { height: 52px; padding: 0 32px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; border: none; }
    .btn-primary { background: var(--Mint); color: var(--Obsidian); }
    .btn-outline { background: none; border: 1px solid var(--Glass-Border); color: #fff; }
    #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; color: var(--Mint); font-weight: 900; }
  </style>
</head>
<body>
  <div id="loadingOverlay">RECONSTRUCTING PASSPORT...</div>
  <header><div class="container"><a class="logo" href="/"><div class="logo-mark"></div><div class="logo-text">KORRA</div></a><button class="btn-outline" style="height:36px" onclick="window.korraSupabase.auth.signOut().then(() => window.location.href='/')">Exit</button></div></header>
  <main>
    <div class="container">
      <div class="passport-card">
        <div class="passport-header"><div><div class="passport-id" id="passportId">ID: PF-XXXXXX</div><h1 class="user-name" id="userName">Loading Profile...</h1></div><div style="text-align:right"><div style="font-size:10px; color:var(--Neutral-400)">STATUS</div><div style="font-size:14px; font-weight:800; color:var(--Mint)">VERIFIED TWIN</div></div></div>
        <div class="biometric-grid" id="bioGrid"></div>
        <div class="qr-area">
          <div class="qr-box" id="qrContainer"><div style="color:#000; font-size:10px; font-weight:900">GENERATE SHARE QR</div></div>
          <h3 style="margin-bottom:8px">Instant Fit Handshake</h3>
          <p style="color:var(--Neutral-400); font-size:14px; margin-bottom:32px">Let any professional scan this code to access your current biometrics.</p>
          <div style="display:flex; justify-content:center; gap:16px"><button class="btn btn-primary" onclick="alert('Sharing logic activated.')">Share with Tailor</button><button class="btn btn-outline">Download PDF</button></div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    (function() {
      const config = { url: 'https://blsettabymllulsxtziw.supabase.co', key: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y' };
      window.korraSupabase = window.supabase.createClient(config.url, config.key);

      async function loadPassport() {
        const { data: { session } } = await window.korraSupabase.auth.getSession();
        if(!session) { window.location.href = '/signin'; return; }
        const u = session.user;
        document.getElementById('userName').textContent = u.user_metadata?.full_name || "Individual User";
        const { data: profile } = await window.korraSupabase.from('profiles').select('*').eq('id', u.id).single();
        if(profile) document.getElementById('passportId').textContent = `ID: ${profile.passport_id}`;
        const { data: passport } = await window.korraSupabase.from('size_passports').select('*').eq('user_id', u.id).single();
        if(passport && passport.current_biometrics) {
            const b = passport.current_biometrics;
            const keys = ['Chest Round', 'Waist Round', 'Hip Round', 'Shoulder', 'Inseam'];
            document.getElementById('bioGrid').innerHTML = keys.map(k => `<div class="bio-item"><div class="bio-label">${k}</div><div class="bio-value">${b[k] || '--'}cm</div></div>`).join('');
        }
        const qrContainer = document.getElementById('qrContainer'); qrContainer.innerHTML = '';
        new QRCode(qrContainer, { text: `https://korra.work/connect?p=${profile?.passport_id}`, width: 160, height: 160, colorDark: "#000000", colorLight: "#ffffff" });
        document.getElementById('loadingOverlay').style.display = 'none';
      }
      loadPassport();
    })();
  </script>
</body>
</html>
