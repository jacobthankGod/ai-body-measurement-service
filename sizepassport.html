<!doctype html>
<html lang="en">
<head>
  <meta name="robots" content="index, follow" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Size Passport | KORRA AI | Your Global Biometric Identity</title>
  <meta name="description" content="Manage your 3D digital twin and share your body measurements securely with any tailor or brand worldwide. One scan, perfect fit everywhere." />

  <!-- Open Graph -->
  <meta property="og:title" content="Size Passport | KORRA AI | Your Global Biometric Identity" />
  <meta property="og:description" content="Manage your 3D digital twin and share your body measurements securely with any tailor or brand worldwide. One scan, perfect fit everywhere." />
  <meta property="og:url" content="https://korra.work/sizepassport" />
  <meta property="og:image" content="https://korra.work/assets/Your%20global%20size%20passport..png" />

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --Obsidian: #000000; --Mint: #57D7C0; --Teal-900: #002D2A; --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1); --Neutral-400: #A3A3A3; --Neutral-500: #737373; --White: #FFFFFF; --Error: #D63031;
      --S-8: 8px; --S-16: 16px; --S-24: 24px; --S-32: 32px; --S-48: 48px; --S-64: 64px; --S-80: 80px; --S-120: 120px; --S-160: 160px;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 24px; }

    /* --- UNIFIED HEADER SYSTEM --- */
    header {
      width: 100%; height: 80px; display: flex; align-items: center; position: fixed; top: 0; z-index: 999999;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--Glass-Border); transition: all 0.3s ease;
    }
    header.scrolled { height: 64px; background: rgba(0, 0, 0, 0.95); }
    header .container { display: flex; align-items: center; justify-content: space-between; padding: 0; position: relative; max-width: 1150px; }

    .logo { display: flex; align-items: center; gap: 16px; cursor: pointer; text-decoration: none; color: inherit; z-index: 1000001; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    nav.main-nav { display: flex; gap: var(--S-32); position: absolute; left: 50%; transform: translateX(-50%); }
    nav.main-nav a { font-size: 13px; font-weight: 600; color: var(--White); text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; transition: 0.2s; }
    nav.main-nav a:hover, nav.main-nav a.active { opacity: 1; color: var(--Mint); }

    .header-auth { display: flex; align-items: center; gap: var(--S-16); z-index: 1000001; }

    .hamburger {
      display: none; width: 44px; height: 44px; background: var(--Glass); border: 1px solid var(--Glass-Border);
      border-radius: 12px; cursor: pointer; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      z-index: 1000001; transition: 0.2s; position: relative;
    }
    .hamburger:hover { border-color: var(--Mint); background: rgba(255,255,255,0.08); }
    .hamburger span { width: 22px; height: 2px; background: var(--Mint); border-radius: 2px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); width: 24px; }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-10px); }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); width: 24px; }

    .mobile-menu {
      position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px);
      z-index: 1000000; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 32px; padding: 40px; transform: translateY(-100%); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; pointer-events: none;
    }
    .mobile-menu.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .mobile-menu a { font-size: 28px; font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: -0.02em; transition: 0.3s; }
    .mobile-menu a:hover { color: var(--Mint); transform: scale(1.05); }
    .mobile-close-btn {
      position: absolute; top: 20px; right: 24px; width: 44px; height: 44px;
      background: var(--Glass); border: 1px solid var(--Glass-Border); border-radius: 12px;
      color: var(--Mint); font-size: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 1000002;
    }
    .mobile-close-btn:hover { border-color: var(--Mint); background: rgba(255,255,255,0.08); }
    .mobile-close-hint { position: absolute; bottom: 40px; font-size: 10px; font-weight: 800; color: var(--Neutral-500); text-transform: uppercase; letter-spacing: 0.2em; }

    /* --- PASSPORT UNIQUE STYLES --- */
    main { padding-top: 140px; padding-bottom: 80px; }
    .passport-card { background: var(--Glass); border: 2px solid var(--Mint); border-radius: 32px; padding: 48px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(87, 215, 192, 0.1); }
    .passport-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .passport-id { font-size: 11px; font-weight: 900; color: var(--Mint); text-transform: uppercase; letter-spacing: 0.2em; background: rgba(87, 215, 192, 0.1); padding: 8px 16px; border-radius: 99px; }
    .user-name { font-size: 32px; font-weight: 900; margin-top: 12px; }
    .biometric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
    .bio-item { padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--Glass-Border); }
    .bio-label { font-size: 10px; font-weight: 900; color: var(--Neutral-400); text-transform: uppercase; margin-bottom: 8px; }
    .bio-value { font-size: 20px; font-weight: 800; color: var(--Mint); }
    .qr-area { text-align: center; margin-top: 48px; padding-top: 48px; border-top: 1px solid var(--Glass-Border); }
    .qr-box { width: 160px; height: 160px; background: #fff; border-radius: 16px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; padding: 10px; }
    .btn { height: 52px; padding: 0 32px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; border: none; }
    .btn-primary { background: var(--Mint); color: var(--Obsidian); }
    .btn-outline { background: none; border: 1px solid var(--Glass-Border); color: #fff; }
    #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; color: var(--Mint); font-weight: 900; letter-spacing: 0.2em; }

    @media (max-width: 1050px) {
      .container { padding: 0 24px; }
      nav.main-nav { display: none !important; }
      .hamburger { display: flex; }
      #authButtons { display: none !important; }
    }

    @media (max-width: 768px) {
      .biometric-grid { grid-template-columns: repeat(2, 1fr); }
      .passport-card { padding: 32px 24px; }
      .user-name { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay">RECONSTRUCTING PASSPORT...</div>

  <header id="mainHeader">
    <div class="container">
      <a class="logo" href="/">
        <img src="/assets/Korra_logo_final.png" alt="Korra" style="height:40px; width:auto;">
        <span style="font-size:22px; font-weight:900; letter-spacing:-0.03em; color:var(--Mint);">Korra</span>
      </a>
      <div class="header-auth">
        <button class="btn btn-outline" style="height:36px; padding:0 16px" onclick="window.korraSupabase.auth.signOut().then(() => window.location.href='/')">Logout Passport</button>
        <div class="hamburger" id="btnHamburger"><span></span><span></span><span></span></div>
      </div>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close-btn" onclick="toggleMenu()">×</button>
    <a href="/#technology" onclick="toggleMenu()">Technology</a>
    <a href="/casestudies.html">Success Stories</a>
    <a href="/about.html">About KORRA</a>
    <a href="/dashboard">Dashboard</a>
    <div style="width:100%; height:1px; background:var(--Glass-Border); margin:16px 0"></div>
    <button class="btn btn-primary" style="width:100%; height:64px; font-size:16px" onclick="window.korraSupabase.auth.signOut().then(() => window.location.href='/')">Sign Out</button>
    <div class="mobile-close-hint">Tap Hamburger to Close</div>
  </div>

  <main>
    <div class="container">
      <div class="passport-card">
        <div class="passport-header">
          <div>
            <div class="passport-id" id="passportId">ID: PF-XXXXXX</div>
            <h1 class="user-name" id="userName">Loading Profile...</h1>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px; color:var(--Neutral-400)">STATUS</div>
            <div style="font-size:14px; font-weight:800; color:var(--Mint)">VERIFIED TWIN</div>
          </div>
        </div>
        <div class="biometric-grid" id="bioGrid"></div>
        <div class="qr-area">
          <div class="qr-box" id="qrContainer"></div>
          <h3 style="margin-bottom:8px">Instant Fit Handshake</h3>
          <p style="color:var(--Neutral-400); font-size:14px; margin-bottom:32px">Let any professional scan this code to access your current biometrics.</p>
          <div style="display:flex; justify-content:center; gap:16px; flex-wrap:wrap">
            <button class="btn btn-primary" onclick="alert('Sharing logic activated.')">Share with Tailor</button>
            <button class="btn btn-outline">Download PDF</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    (function() {
      // --- UI LOGIC ---
      const hamburger = document.getElementById('btnHamburger');
      const mobileMenu = document.getElementById('mobileMenu');
      window.toggleMenu = function() {
        if (!hamburger || !mobileMenu) return;
        hamburger.classList.toggle('active');
        mobileMenu.classList.toggle('active');
        document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
      };
      if (hamburger) hamburger.addEventListener('click', toggleMenu);

      const config = { url: 'https://blsettabymllulsxtziw.supabase.co', key: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y' };
      if (!window.supabase) { console.error("KORRA: Supabase Offline."); return; }
      window.korraSupabase = window.supabase.createClient(config.url, config.key);

      async function loadPassport() {
        const { data: { session } } = await window.korraSupabase.auth.getSession();
        if(!session) { window.location.href = '/signin'; return; }
        const u = session.user;

        const { data: profile } = await window.korraSupabase.from('profiles').select('*').eq('id', u.id).single();
        if(profile) {
            document.getElementById('userName').textContent = profile.full_name || "Individual User";
            document.getElementById('passportId').textContent = `ID: ${profile.passport_id}`;
        }

        const { data: passport } = await window.korraSupabase.from('size_passports').select('*').eq('user_id', u.id).single();
        if(passport && passport.current_biometrics) {
            const b = passport.current_biometrics;
            const keys = ['Chest Round', 'Waist Round', 'Hip Round', 'Shoulder', 'Inseam'];
            document.getElementById('bioGrid').innerHTML = keys.map(k => `
              <div class="bio-item">
                <div class="bio-label">${k}</div>
                <div class="bio-value">${b[k] || '--'}cm</div>
              </div>
            `).join('');
        } else {
            document.getElementById('bioGrid').innerHTML = `<div style="grid-column: 1/-1; padding:40px; text-align:center; color:var(--Neutral-400)">No active biometrics found. Visit a professional to start your first scan.</div>`;
        }

        const qrContainer = document.getElementById('qrContainer');
        if (qrContainer && profile) {
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: `https://korra.work/connect?p=${profile.passport_id}`,
                width: 140, height: 140, colorDark: "#000000", colorLight: "#ffffff"
            });
        }
        document.getElementById('loadingOverlay').style.display = 'none';
      }
      loadPassport();
    })();
  </script>
</body>
</html>
