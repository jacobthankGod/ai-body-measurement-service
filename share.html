<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KORRA | Start Your Scan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --Neutral-500: #737373;
      --White: #FFFFFF;
      --Error: #D63031;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; }

    .share-viewport { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .share-card {
      width: 100%; max-width: 440px; background: var(--Glass); border: 1px solid var(--Glass-Border);
      border-radius: 32px; padding: 48px 32px; backdrop-filter: blur(20px);
    }

    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); margin: 0 auto 32px; }
    .title { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { font-size: 14px; color: var(--Neutral-400); text-align: center; margin-bottom: 48px; line-height: 1.5; }

    .input-group { margin-bottom: 24px; }
    .label { font-size: 10px; font-weight: 900; color: var(--Neutral-500); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.1em; }
    .input { width: 100%; height: 56px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border); border-radius: 12px; padding: 0 16px; color: #fff; font-size: 16px; transition: 0.2s; outline: none; }
    .input:focus { border-color: var(--Mint); background: rgba(255,255,255,0.08); }

    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 40px; }
    .photo-box {
      height: 140px; border: 1px dashed var(--Glass-Border); border-radius: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;
    }
    .photo-box:hover { border-color: var(--Mint); background: rgba(87,215,192,0.05); }
    .photo-box span { font-size: 11px; font-weight: 800; color: var(--Neutral-500); text-transform: uppercase; }
    .photo-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
    .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }

    .btn-submit { width: 100%; height: 60px; background: var(--Mint); color: var(--Obsidian); border: none; border-radius: 16px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.05em; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(87,215,192,0.2); }
    .btn-submit:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; transform: none; }

    #loadingOverlay {
        position: absolute; inset: 0; background: #000; z-index: 100;
        display: none; flex-direction: column; align-items: center; justify-content: center; border-radius: 32px;
    }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(87,215,192,0.1); border-top-color: var(--Mint); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; font-weight: 900; letter-spacing: 0.2em; color: var(--Mint); text-transform: uppercase; }

    #errorView { display: none; text-align: center; }
    .error-title { color: var(--Error); font-weight: 800; font-size: 20px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="share-viewport">

    <div class="share-card" id="mainCard">
      <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Extracting Biometrics</div>
      </div>

      <div id="initView">
        <div class="logo-mark"></div>
        <h1 class="title">Start Your Scan</h1>
        <p class="subtitle" id="subjectSubtitle">You've been invited to capture your clinical body measurements for your artisan fitting.</p>

        <form id="shareForm">
          <div class="input-group">
            <label class="label">Height (CM)</label>
            <input type="number" id="height" class="input" placeholder="e.g. 175" required>
          </div>

          <div class="input-group">
            <label class="label">Gender</label>
            <select id="gender" class="input" style="appearance: none; cursor: pointer;">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div class="photo-grid">
            <div class="photo-box">
              <img class="preview-img" id="frontPrev">
              <span>Front Photo</span>
              <input type="file" id="front" accept="image/*" required onchange="handlePreview(this, 'frontPrev')">
            </div>
            <div class="photo-box">
              <img class="preview-img" id="sidePrev">
              <span>Side Photo</span>
              <input type="file" id="side" accept="image/*" required onchange="handlePreview(this, 'sidePrev')">
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit">Calculate Measurements</button>
        </form>
      </div>

      <div id="errorView">
        <div style="font-size: 48px; margin-bottom: 24px;">⚠️</div>
        <div class="error-title">Link Expired</div>
        <p class="subtitle">This scan invitation is no longer valid. Please request a new link from your merchant.</p>
      </div>

    </div>
  </div>

  <script>
    let sessionData = null;

    async function verifyLink() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) { showStatus('error'); return; }

      try {
        const res = await fetch(`/api/v2/share/verify/${token}`);
        if (res.ok) {
          sessionData = await res.json();
          document.getElementById('subjectSubtitle').textContent = `Invited by: Artisan Vault. Subject: ${sessionData.client_name}`;
        } else { showStatus('error'); }
      } catch (e) { showStatus('error'); }
    }

    function showStatus(status) {
      document.getElementById('initView').style.display = status === 'error' ? 'none' : 'block';
      document.getElementById('errorView').style.display = status === 'error' ? 'block' : 'none';
    }

    function handlePreview(input, imgId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.getElementById(imgId);
          img.src = e.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    document.getElementById('shareForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loader = document.getElementById('loadingOverlay');
      loader.style.display = 'flex';

      const fd = new FormData();
      fd.append('front', document.getElementById('front').files[0]);
      fd.append('side', document.getElementById('side').files[0]);
      fd.append('height', document.getElementById('height').value);
      fd.append('gender', document.getElementById('gender').value);
      fd.append('merchant_id', sessionData.merchant_id);
      fd.append('client_name', sessionData.client_name);

      try {
        const res = await fetch('/api/v2/measurements/extract-widget', { method: 'POST', body: fd });
        if (res.ok) {
          document.getElementById('mainCard').innerHTML = `
            <div style="text-align:center; padding: 40px 0;">
              <div style="font-size:48px; margin-bottom:24px;">✅</div>
              <h2 class="title" style="color:var(--Mint)">Scan Complete</h2>
              <p class="subtitle">Your measurements have been securely sent to your merchant. You may now close this window.</p>
            </div>
          `;
        } else {
          const err = await res.json();
          alert("Quality Rejection: " + (err.detail?.error || "Low light"));
          loader.style.display = 'none';
        }
      } catch (err) {
        alert("Sync error. Check connection.");
        loader.style.display = 'none';
      }
    });

    verifyLink();
  </script>
</body>
</html>
