<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- --- TRUE INDUSTRIAL SELF-HOSTING --- -->
  <script src="/assets/supabase.min.js"></script>

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #C6FF00;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --White: #FFFFFF;
      --S-24: 24px; --S-32: 32px; --S-48: 48px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; }

    .split-layout { display: grid; grid-template-columns: 1fr 1.2fr; width: 100%; height: 100vh; }

    .side-panel {
        background: url('/assets/A faster way to measure, store, and share fit data..png') center center / cover no-repeat;
        border-right: 1px solid var(--Glass-Border); position: relative;
    }
    .side-overlay {
        position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 64px;
    }
    .side-overlay h1 { font-size: 48px; font-weight: 900; line-height: 1.1; letter-spacing: -0.04em; color: #fff; }
    .side-overlay p { font-size: 18px; color: var(--Mint); margin-top: 16px; font-weight: 600; }

    .form-panel { display: flex; align-items: center; justify-content: center; padding: 64px; overflow-y: auto; background: #000; }
    .form-container { width: 100%; max-width: 440px; }

    @media (max-width: 1000px) {
      html, body { overflow: auto; height: auto; }
      .split-layout { grid-template-columns: 1fr; min-height: 100vh; height: auto; overflow: visible; }
      .side-panel { display: none; }
      .form-panel { padding: 48px 24px; align-items: center; justify-content: center; min-height: 100vh; height: auto; }
    }

    .logo-area { display: flex; align-items: center; gap: 16px; margin-bottom: 48px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    .sub-p { color: var(--Neutral-400); margin-bottom: 40px; font-size: 15px; line-height: 1.6; }

    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--Neutral-400); letter-spacing: 0.1em; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border);
      border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; transition: 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--Mint); background: rgba(255,255,255,0.08); }

    .btn {
      width: 100%; height: 52px; background: var(--Mint); color: var(--Obsidian); border: none;
      border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #D9FF4D; transform: translateY(-1px); }

    .switch-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--Neutral-400); text-decoration: none; transition: 0.2s; }
    .switch-link span { color: var(--Mint); font-weight: 700; }
    .switch-link:hover { color: #fff; }

    .msg { display: none; padding: 14px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
    .msg.error { display: block; background: rgba(214,48,49,0.12); border: 1px solid rgba(214,48,49,0.4); color: #ff8a8a; }
    .msg.success { display: block; background: rgba(198,255,0,0.1); border: 1px solid rgba(198,255,0,0.4); color: var(--Mint); }

    .status-icon { width: 80px; height: 80px; background: var(--Mint); color: var(--Obsidian); border-radius: 50%; margin: 0 auto 32px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 0 40px rgba(198, 255, 0, 0.3); }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--Glass); border-top: 4px solid var(--Mint); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .center { text-align: center; }
  </style>
</head>
<body>

  <div class="split-layout">
    <!-- LEFT: SIDE PANEL -->
    <div class="side-panel">
      <div class="side-overlay">
        <h1>Reset Your<br>Access.</h1>
        <p>Set a new password and get back to work.</p>
      </div>
    </div>

    <!-- RIGHT: FORM PANEL -->
    <div class="form-panel">
      <div class="form-container">
        <a href="/" class="logo-area">
          <img src="/assets/Korra_logo_final.png" alt="Korra" style="height:40px; width:auto;">
          <span style="font-size:22px; font-weight:900; letter-spacing:-0.03em; color:var(--Mint);">Korra</span>
        </a>

        <!-- FORM STATE -->
        <div id="resetFormState">
          <h2>Reset Password</h2>
          <p class="sub-p">Choose a new password for your account.</p>

          <div id="errorMsg" class="msg error"></div>

          <form id="resetForm">
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-input" id="newPass" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-input" id="confirmPass" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn">Update Password</button>
          </form>

          <a href="/signin" class="switch-link">Remembered it? <span>Sign In</span></a>
        </div>

        <!-- LOADING STATE -->
        <div id="resetLoadingState" style="display:none;">
          <div class="spinner"></div>
          <h2>Updating Password</h2>
          <p class="sub-p center">Securing your account...</p>
        </div>

        <!-- SUCCESS STATE -->
        <div id="resetSuccessState" style="display:none;" class="center">
          <div class="status-icon">✓</div>
          <h2>Password Updated</h2>
          <p class="sub-p">Your password has been changed. Redirecting you to sign in...</p>
          <a href="/signin" class="btn" style="text-decoration:none;">Continue to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://blsettabymllulsxtziw.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y';

      function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('error');
      }

      function initSupabase() {
        if (typeof window.supabase === 'undefined') {
          setTimeout(initSupabase, 500);
          return;
        }
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Collect reset code from query (?code=) or hash (#access_token / #code)
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        let hashToken = null;
        if (!code && window.location.hash) {
          const hashParams = new URLSearchParams(window.location.hash.substring(1));
          hashToken = hashParams.get('code') || hashParams.get('access_token');
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newPass = document.getElementById('newPass').value;
          const confirmPass = document.getElementById('confirmPass').value;

          if (newPass !== confirmPass) { showError('Passwords do not match.'); return; }
          if (newPass.length < 6) { showError('Password must be at least 6 characters.'); return; }

          document.getElementById('resetFormState').style.display = 'none';
          document.getElementById('resetLoadingState').style.display = 'block';

          let sessionError = null;
          try {
            if (code) {
              const { error } = await supabase.auth.exchangeCodeForSession(code);
              sessionError = error;
            } else if (hashToken) {
              const { data } = await supabase.auth.getSession();
              if (!data.session) sessionError = new Error('Your reset link is invalid or has expired.');
            } else {
              sessionError = new Error('Missing reset code. Please request a new link.');
            }
          } catch (err) {
            sessionError = err;
          }

          if (sessionError) {
            document.getElementById('resetLoadingState').style.display = 'none';
            document.getElementById('resetFormState').style.display = 'block';
            showError(sessionError.message || 'Unable to verify reset link.');
            return;
          }

          const { error } = await supabase.auth.updateUser({ password: newPass });
          if (error) {
            document.getElementById('resetLoadingState').style.display = 'none';
            document.getElementById('resetFormState').style.display = 'block';
            showError(error.message);
            return;
          }

          document.getElementById('resetLoadingState').style.display = 'none';
          document.getElementById('resetSuccessState').style.display = 'block';
          setTimeout(() => { window.location.href = '/signin'; }, 2500);
        });
      }
      initSupabase();
    })();
  </script>
</body>
</html>
