<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KORRA | Get Measured</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Teal-900: #002D2A;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --Neutral-500: #737373;
      --White: #FFFFFF;
      --Error: #D63031;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; }

    .widget-viewport {
      height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn 0.4s ease-out;
    }

    .widget-card {
      width: 100%; max-width: 420px; background: var(--Glass); border: 1px solid var(--Glass-Border);
      border-radius: 24px; padding: 32px; backdrop-filter: blur(10px);
    }

    .title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: var(--Neutral-400); text-align: center; margin-bottom: 32px; }

    .input-group { margin-bottom: 20px; }
    .label { font-size: 10px; font-weight: 900; color: var(--Neutral-500); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .input { width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border); border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; transition: 0.2s; outline: none; }
    .input:focus { border-color: var(--Mint); }

    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .photo-box {
      height: 110px; border: 1px dashed var(--Glass-Border); border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;
    }
    .photo-box:hover { border-color: var(--Mint); background: rgba(87,215,192,0.05); }
    .photo-box span { font-size: 10px; font-weight: 800; color: var(--Neutral-500); }
    .photo-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
    .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }

    .btn-submit { width: 100%; height: 52px; background: var(--Mint); color: var(--Obsidian); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .btn-submit:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

    #loadingOverlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
        display: none; align-items: center; justify-content: center; border-radius: 24px;
        font-size: 11px; font-weight: 900; letter-spacing: 0.1em; color: var(--Mint);
    }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <div class="widget-viewport">
    <div class="widget-card">
      <div id="loadingOverlay">EXTRACTING BIOMETRICS...</div>

      <h1 class="title">Get Measured</h1>
      <p class="subtitle">AI Biometrics for a perfect fit.</p>

      <form id="widgetForm">
        <div class="input-group">
          <label class="label">Height (CM)</label>
          <input type="number" id="height" class="input" placeholder="e.g. 180" required>
        </div>

        <div class="input-group">
          <label class="label">Gender</label>
          <select id="gender" class="input" style="appearance: none; cursor: pointer;">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div class="photo-grid">
          <div class="photo-box">
            <img class="preview-img" id="frontPrev">
            <span>Front View</span>
            <input type="file" id="front" accept="image/*" required onchange="handlePreview(this, 'frontPrev')">
          </div>
          <div class="photo-box">
            <img class="preview-img" id="sidePrev">
            <span>Side View</span>
            <input type="file" id="side" accept="image/*" required onchange="handlePreview(this, 'sidePrev')">
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">Calculate My Size</button>
      </form>
    </div>
  </div>

  <script>
    function handlePreview(input, imgId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.getElementById(imgId);
          img.src = e.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    document.getElementById('widgetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loader = document.getElementById('loadingOverlay');
      const params = new URLSearchParams(window.location.search);
      const merchantId = params.get('merchant') || 'PUBLIC_WIDGET';

      loader.style.display = 'flex';

      const fd = new FormData();
      fd.append('front', document.getElementById('front').files[0]);
      fd.append('side', document.getElementById('side').files[0]);
      fd.append('height', document.getElementById('height').value);
      fd.append('gender', document.getElementById('gender').value);
      fd.append('merchant_id', merchantId);
      fd.append('client_name', 'Widget Customer');

      try {
        const res = await fetch('/api/v2/measurements/extract-widget', { method: 'POST', body: fd });
        if (res.ok) {
          const data = await res.json();
          // Handshake back to host site
          window.parent.postMessage({ type: 'KORRA_RESULT', measurements: data.measurements }, '*');

          document.querySelector('.widget-card').innerHTML = `
            <div style="text-align:center; padding: 20px 0;">
              <div style="font-size:40px; margin-bottom:24px;">✅</div>
              <h2 class="title">Sync Complete</h2>
              <p class="subtitle">Biometrics transmitted successfully.</p>
              <button class="btn-submit" onclick="location.reload()">New Scan</button>
            </div>
          `;
        } else {
          const err = await res.json();
          alert("Handshake Failure: " + (err.detail?.error || "Low quality"));
          loader.style.display = 'none';
        }
      } catch (err) {
        alert("Connection Error. Please check network.");
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
