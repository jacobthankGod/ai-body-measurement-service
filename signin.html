<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --White: #FFFFFF;
      --S-24: 24px; --S-32: 32px; --S-48: 48px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; }

    .auth-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .auth-card {
      width: 100%; max-width: 440px; background: var(--Glass); border: 1px solid var(--Glass-Border);
      border-radius: 24px; padding: var(--S-48); backdrop-filter: blur(20px);
    }

    .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    p { color: var(--Neutral-400); margin-bottom: 40px; font-size: 15px; }

    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--Neutral-400); letter-spacing: 0.1em; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border);
      border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; transition: 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--Mint); background: rgba(255,255,255,0.08); }

    .btn {
      width: 100%; height: 52px; background: var(--Mint); color: var(--Obsidian); border: none;
      border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #6effeb; transform: translateY(-1px); }

    .switch-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--Neutral-400); text-decoration: none; transition: 0.2s; }
    .switch-link span { color: var(--Mint); font-weight: 700; }
    .switch-link:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="logo-area">
        <div class="logo-mark"></div>
        <div class="logo-text">KORRA</div>
      </a>
      <h2>Welcome back</h2>
      <p>Identify yourself to enter the command center.</p>

      <form id="signInForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="inEmail" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="inPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Enter Workbench</button>
      </form>

      <a href="/signup" class="switch-link">Don't have an account? <span>Get Access</span></a>
    </div>
  </div>

  <!-- --- TRUE INDUSTRIAL SELF-HOSTING --- -->
  <script src="/assets/supabase.min.js"></script>
  <script>
    (function() {
      // --- SUPER-USER AUTHORITY LIST ---
      const ADMIN_LIST = ['springbionics@gmail.com', 'admin@korra.work'];

      function initSupabase() {
        if (typeof window.supabase === 'undefined') {
          setTimeout(initSupabase, 500);
          return;
        }
        const config = {
          supabaseUrl: 'https://blsettabymllulsxtziw.supabase.co',
          supabaseKey: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y'
        };
        const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

        document.getElementById('signInForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('inEmail').value;
          const password = document.getElementById('inPass').value;
          const btn = e.target.querySelector('button');
          btn.textContent = 'Verifying Authority...';
          btn.style.opacity = '0.7';

          const { data, error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            alert(error.message);
            btn.textContent = 'Enter Workbench';
            btn.style.opacity = '1';
          } else {
            console.log("PfDebug: Auth Success. Routing for", email);

            // --- SMART ROUTING (Mauritius-Level Hardening) ---
            if (ADMIN_LIST.includes(email.toLowerCase())) {
              console.log("PfDebug: Super-User Detected. Routing to Admin Terminal.");
              window.location.href = '/admin';
            } else {
              window.location.href = '/dashboard';
            }
          }
        });
      }
      initSupabase();
    })();
  </script>
</body>
</html>
