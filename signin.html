<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | KORRA</title>

  <link rel="icon" type="image/png" href="/assets/body-capture.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- --- TRUE INDUSTRIAL SELF-HOSTING --- -->
  <script src="/assets/supabase.min.js"></script>

  <style>
    :root {
      --Obsidian: #000000;
      --Mint: #57D7C0;
      --Glass: rgba(255, 255, 255, 0.04);
      --Glass-Border: rgba(255, 255, 255, 0.1);
      --Neutral-400: #A3A3A3;
      --White: #FFFFFF;
      --S-24: 24px; --S-32: 32px; --S-48: 48px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--Obsidian); color: var(--White); font-family: 'Inter', sans-serif; overflow: hidden; }

    .split-layout { display: grid; grid-template-columns: 1fr 1.2fr; width: 100%; height: 100vh; }

    .side-panel {
        background: url('/assets/A faster way to measure, store, and share fit data..png') center center / cover no-repeat;
        border-right: 1px solid var(--Glass-Border); position: relative;
    }
    .side-overlay {
        position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 64px;
    }
    .side-overlay h1 { font-size: 48px; font-weight: 900; line-height: 1.1; letter-spacing: -0.04em; color: #fff; }
    .side-overlay p { font-size: 18px; color: var(--Mint); margin-top: 16px; font-weight: 600; }

    .form-panel { display: flex; align-items: center; justify-content: center; padding: 64px; overflow-y: auto; background: #000; }
    .form-container { width: 100%; max-width: 440px; }

    @media (max-width: 1000px) {
      .split-layout { grid-template-columns: 1fr; }
      .side-panel { display: none; }
      .form-panel { padding: 48px 24px; }
    }

    .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; color: inherit; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--Mint); transform: rotate(-8deg); }
.logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.05em; }

    h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    .sub-p { color: var(--Neutral-400); margin-bottom: 40px; font-size: 15px; }

    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--Neutral-400); letter-spacing: 0.1em; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 52px; background: rgba(255,255,255,0.05); border: 1px solid var(--Glass-Border);
      border-radius: 12px; padding: 0 16px; color: #fff; font-size: 14px; transition: 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--Mint); background: rgba(255,255,255,0.08); }

    .btn {
      width: 100%; height: 52px; background: var(--Mint); color: var(--Obsidian); border: none;
      border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #6effeb; transform: translateY(-1px); }

    .btn-google {
      width: 100%; height: 52px; background: #fff; color: #333; border: none;
      border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px;
    }
    .btn-google:hover { background: #f5f5f5; transform: translateY(-1px); }
    .btn-google svg { width: 20px; height: 20px; }

    .divider { display: flex; align-items: center; margin: 24px 0; color: var(--Neutral-400); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--Glass-Border); }
    .divider span { padding: 0 16px; }

    .switch-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--Neutral-400); text-decoration: none; transition: 0.2s; }
    .switch-link span { color: var(--Mint); font-weight: 700; }
    .switch-link:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="split-layout">
    <!-- LEFT: SIDE PANEL -->
    <div class="side-panel">
      <div class="side-overlay">
        <h1>Welcome Back.</h1>
        <p>Your industrial fit engine is ready.</p>
      </div>
    </div>

    <!-- RIGHT: FORM PANEL -->
    <div class="form-panel">
      <div class="form-container">
<a href="/" class="logo-area">
          <div class="logo-mark"></div>
          <div class="logo-text">KORRA</div>
        </a>

        <h2>Sign In</h2>
        <p class="sub-p">Identify yourself to enter the command center.</p>

        <!-- Google OAuth Button -->
        <button type="button" class="btn-google" id="btnGoogleSignIn">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M45.12 24.5c0-2.6-2.1-4.7-4.7-4.7H24v8.4h11.8c-.5 2.7-2 5-4.3 6.6l6.6 5.1c3.8-3.5 6.2-8.7 6.2-15.4z"/>
            <path fill="#34A853" d="M24 46c5.4 0 9.9-1.8 13.2-4.8l-6.6-5.1c-2 .8-4.5 1.3-6.6 1.3-5.1 0-9.4-3.4-11-8H2v5.3c3.4 6.6 8.2 12.3 14.5 12.3 3.6 0 6.9-.9 9.5-2.5l-2-1.8z"/>
            <path fill="#FBBC05" d="M13 28.9c.3-.8.5-1.7.5-2.9s-.2-2.1-.5-2.9V18H2c-1.2 2.4-1.9 5-.1 7.4l7.9-4.5z"/>
            <path fill="#EA4335" d="M24 10.3c3.1 0 5.8 1.1 7.9 3.1l4.3-4.3C35.6 5.1 30.3 2 24 2 17.7 2 12.5 5.7 9.5 12.3l7.9 6.1c1.6-4.6 5.9-8 8.6-8z"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider"><span>or</span></div>

        <form id="signInForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="inEmail" placeholder="name@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="inPass" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn">Sign In</button>
        </form>

        <a href="/signup" class="switch-link">Don't have an account? <span>Sign Up</span></a>
      </div>
</div>
  </div>

  <script>
    (function() {
      const ADMIN_LIST = ['springbionics@gmail.com', 'admin@korra.work'];

      function initSupabase() {
        if (typeof window.supabase === 'undefined') {
          setTimeout(initSupabase, 500);
          return;
        }
        const config = {
          supabaseUrl: 'https://blsettabymllulsxtziw.supabase.co',
          supabaseKey: 'sb_publishable_miCOIXHtlxLkfDgpwE0N-g_BA1Q-x8y'
        };
        const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

        // Google OAuth Sign-In Handler
        document.getElementById('btnGoogleSignIn').addEventListener('click', async () => {
          const btn = document.getElementById('btnGoogleSignIn');
          btn.disabled = true;
          btn.textContent = 'Connecting to Google...';

          try {
            const { data, error } = await supabase.auth.signInWithOAuth({
              provider: 'google',
              options: {
                redirectTo: window.location.origin + '/onboarding'
              }
            });

            if (error) {
              alert(error.message);
              btn.disabled = false;
              btn.innerHTML = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M45.12 24.5c0-2.6-2.1-4.7-4.7-4.7H24v8.4h11.8c-.5 2.7-2 5-4.3 6.6l6.6 5.1c3.8-3.5 6.2-8.7 6.2-15.4z"/><path fill="#34A853" d="M24 46c5.4 0 9.9-1.8 13.2-4.8l-6.6-5.1c-2 .8-4.5 1.3-6.6 1.3-5.1 0-9.4-3.4-11-8H2v5.3c3.4 6.6 8.2 12.3 14.5 12.3 3.6 0 6.9-.9 9.5-2.5l-2-1.8z"/><path fill="#FBBC05" d="M13 28.9c.3-.8.5-1.7.5-2.9s-.2-2.1-.5-2.9V18H2c-1.2 2.4-1.9 5-.1 7.4l7.9-4.5z"/><path fill="#EA4335" d="M24 10.3c3.1 0 5.8 1.1 7.9 3.1l4.3-4.3C35.6 5.1 30.3 2 24 2 17.7 2 12.5 5.7 9.5 12.3l7.9 6.1c1.6-4.6 5.9-8 8.6-8z"/></svg> Continue with Google`;
            }
          } catch (err) {
            alert('Google sign-in failed. Please try again.');
            btn.disabled = false;
            btn.innerHTML = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M45.12 24.5c0-2.6-2.1-4.7-4.7-4.7H24v8.4h11.8c-.5 2.7-2 5-4.3 6.6l6.6 5.1c3.8-3.5 6.2-8.7 6.2-15.4z"/><path fill="#34A853" d="M24 46c5.4 0 9.9-1.8 13.2-4.8l-6.6-5.1c-2 .8-4.5 1.3-6.6 1.3-5.1 0-9.4-3.4-11-8H2v5.3c3.4 6.6 8.2 12.3 14.5 12.3 3.6 0 6.9-.9 9.5-2.5l-2-1.8z"/><path fill="#FBBC05" d="M13 28.9c.3-.8.5-1.7.5-2.9s-.2-2.1-.5-2.9V18H2c-1.2 2.4-1.9 5-.1 7.4l7.9-4.5z"/><path fill="#EA4335" d="M24 10.3c3.1 0 5.8 1.1 7.9 3.1l4.3-4.3C35.6 5.1 30.3 2 24 2 17.7 2 12.5 5.7 9.5 12.3l7.9 6.1c1.6-4.6 5.9-8 8.6-8z"/></svg> Continue with Google`;
          }
        });

        document.getElementById('signInForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('inEmail').value;
          const password = document.getElementById('inPass').value;
          const btn = e.target.querySelector('button');
          btn.textContent = 'Verifying Authority...';
          btn.style.opacity = '0.7';

          const { error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            alert(error.message);
            btn.textContent = 'Sign In';
            btn.style.opacity = '1';
          } else {
            // Check onboarding status
            const { data: { user } } = await supabase.auth.getUser();
            const { data: profile } = await supabase
              .from('profiles')
              .select('onboarding_completed_at')
              .eq('id', user.id)
              .single();

            if (!profile || !profile.onboarding_completed_at) {
              window.location.href = '/onboarding';
              return;
            }

            const params = new URLSearchParams(window.location.search);
            const next = params.get('next');
            if (next) window.location.href = next;
            else if (ADMIN_LIST.includes(email.toLowerCase())) window.location.href = '/admin';
            else window.location.href = '/dashboard';
          }
        });
      }
      initSupabase();
    })();
  </script>
</body>
</html>
